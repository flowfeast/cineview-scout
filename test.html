<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineView Pro - 集成版 v2.6</title>
    <style>
        :root { --accent: #FFD700; --bar-h: 60px; --bottom-h: 120px; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .top-bar { height: var(--bar-h); width: 100%; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; font-size: 10px; color: #777; border-bottom: 1px solid #222; padding-top: env(safe-area-inset-top); }
        
        #viewport-container { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; background: #050505; }
        #viewfinder { position: relative; aspect-ratio: 4 / 3; height: 95%; background: #000; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        .bottom-bar { 
            height: var(--bottom-h); 
            width: 100%; 
            background: #000; 
            display: grid; 
            grid-template-columns: 75px 75px 1fr 75px; 
            align-items: center; 
            padding: 0 10px; 
            box-sizing: border-box; 
            border-top: 1px solid #222; 
            padding-bottom: env(safe-area-inset-bottom);
            gap: 8px;
        }

        .focal-info-list { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: #0a0a0a; 
            height: 40px; 
            border-radius: 20px; 
            padding: 0 15px;
            border: 1px solid #1a1a1a;
        }
        .focal-info-item { font-size: 11px; color: #444; font-weight: 400; letter-spacing: 0.5px; }
        .focal-info-item.accent { color: var(--accent); }
        
        .ctrl-btn { height: 50px; border-radius: 8px; background: #151515; border: 1px solid #333; color: #777; font-size: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        .ctrl-btn span { color: var(--accent); font-size: 11px; margin-top: 2px; }
        .rec-btn { background: #600; border: none; font-size: 12px; color: white; }

        #mask { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="mask" onclick="init()">
    <div><h2 style="letter-spacing: 2px; font-weight: 300;">CINEVIEW PRO</h2><p style="font-size: 10px; color: #555;">[ CLICK TO SENSOR ]</p></div>
</div>

<div class="top-bar">
    <div id="status-l">MODE: NATIVE</div>
    <div id="device-tag">IPHONE 16 PRO</div>
    <div id="status-r">CLEAN HUD</div>
</div>

<div id="viewport-container">
    <div id="viewfinder"><video id="v" autoplay playsinline muted></video><canvas id="c"></canvas></div>
</div>

<div class="bottom-bar">
    <div class="ctrl-btn" onclick="switchCam()">CAM<br><span id="cam-label">16P</span></div>
    <div class="ctrl-btn" onclick="switchFormat()">FMT<br><span id="fmt-label">NATIVE</span></div>
    <div class="focal-info-list" id="info-container"></div>
    <div class="ctrl-btn rec-btn" onclick="takeSnapshot()">REC</div>
</div>

<script>
    const state = {
        idx: 1,
        devs: [
            {n:'15P', fullName: 'IPHONE 15 PRO', tele:3, teleMM:72}, 
            {n:'16P', fullName: 'IPHONE 16 PRO', tele:5, teleMM:120}, 
            {n:'17P', fullName: 'IPHONE 17 PRO', tele:4, teleMM:100}
        ],
        fmt: 'NATIVE',
        config: {
            NATIVE: ['1x', 'Tele'],
            S35: ['16', '21', '32', '40', '50', '75'],
            FF: ['24', '32', '40', '50', '75']
        }
    };

    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
            v.srcObject = stream;
            v.onloadedmetadata = () => {
                v.play(); sync(); updateInfoUI();
                document.getElementById('mask').style.display = 'none';
                requestAnimationFrame(renderLoop);
            };
        } catch (e) { alert("Camera Error"); }
    }

    function switchFormat() {
        const fmts = ['NATIVE', 'S35', 'FF'];
        state.fmt = fmts[(fmts.indexOf(state.fmt) + 1) % fmts.length];
        document.getElementById('fmt-label').innerText = state.fmt;
        document.getElementById('status-l').innerText = `MODE: ${state.fmt}`;
        updateInfoUI();
    }

    function switchCam() {
        state.idx = (state.idx + 1) % state.devs.length;
        document.getElementById('cam-label').innerText = state.devs[state.idx].n;
        document.getElementById('device-tag').innerText = state.devs[state.idx].fullName;
        updateInfoUI();
    }

    function updateInfoUI() {
        const container = document.getElementById('info-container');
        container.innerHTML = '';
        state.config[state.fmt].forEach((f, i) => {
            const el = document.createElement('span');
            el.className = `focal-info-item ${i === 0 ? 'accent' : ''}`;
            el.innerText = f === 'Tele' ? state.devs[state.idx].tele + 'x' : f;
            container.appendChild(el);
        });
    }

    function sync() {
        const r = document.getElementById('viewfinder').getBoundingClientRect();
        c.width = r.width; c.height = r.height;
    }

    function renderLoop() {
        ctx.clearRect(0, 0, c.width, c.height);
        state.config[state.fmt].forEach((fStr, i) => {
            let mm = 24;
            if (state.fmt === 'NATIVE') mm = (fStr === '1x') ? 24 : state.devs[state.idx].teleMM;
            else if (state.fmt === 'S35') mm = parseFloat(fStr) * 1.5;
            else mm = parseFloat(fStr);

            const ratio = 24 / mm;
            if (ratio > 1.05) return;

            const bw = c.width * ratio; const bh = c.height * ratio;
            const bx = (c.width - bw) / 2; const by = (c.height - bh) / 2;

            ctx.lineWidth = 2;
            ctx.strokeStyle = (i === 0) ? "#FFD700" : "#FFFFFF";
            if (parseFloat(fStr) > 40 || (state.fmt === 'NATIVE' && fStr === 'Tele')) ctx.setLineDash([10, 8]);
            else ctx.setLineDash([]);
            
            ctx.strokeRect(bx, by, bw, bh);

            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = "10px monospace";
            // 核心修改：仅保留焦段数字标注
            const label = (state.fmt === 'NATIVE' && fStr === 'Tele') ? `${state.devs[state.idx].tele}x` : `${fStr}mm`;
            ctx.fillText(label, bx + 5, by + 12);
        });
        requestAnimationFrame(renderLoop);
    }

    function takeSnapshot() {
        const out = document.createElement('canvas');
        out.width = 1920; out.height = 1440;
        const oCtx = out.getContext('2d');
        oCtx.drawImage(v, 0, 0, out.width, out.height);
        // ... (省略复杂的导出重绘逻辑，保持与 renderLoop 标注一致)
        const link = document.createElement('a');
        link.download = `CineScout_${Date.now()}.jpg`;
        link.href = out.toDataURL('image/jpeg', 0.95);
        link.click();
    }

    window.addEventListener('resize', sync);
</script>
</body>
</html>
