<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineView Pro - 勘景集成版 v2.5</title>
    <style>
        :root { --accent: #FFD700; --bar-h: 60px; --bottom-h: 120px; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 顶部状态栏 */
        .top-bar { height: var(--bar-h); width: 100%; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; font-size: 10px; color: #777; border-bottom: 1px solid #222; padding-top: env(safe-area-inset-top); }
        
        /* 4:3 锁定取景区域 */
        #viewport-container { flex: 1; position: relative; width: 100%; display: flex; align-items: center; justify-content: center; background: #050505; overflow: hidden; }
        #viewfinder { position: relative; aspect-ratio: 4 / 3; height: 95%; background: #000; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* 底部操作栏 */
        .bottom-bar { 
            height: var(--bottom-h); 
            width: 100%; 
            background: #000; 
            display: grid; 
            grid-template-columns: 75px 75px 1fr 75px; 
            align-items: center; 
            padding: 0 10px; 
            box-sizing: border-box; 
            border-top: 1px solid #222; 
            padding-bottom: env(safe-area-inset-bottom);
            gap: 8px;
        }

        /* 静态焦段信息显示 (缩小减细) */
        .focal-info-list { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: #0a0a0a; 
            height: 44px; 
            border-radius: 22px; 
            padding: 0 12px;
            border: 1px solid #1a1a1a;
        }
        .focal-info-item { 
            font-size: 11px; 
            color: #555; 
            font-weight: 400; 
            letter-spacing: 0.5px;
        }
        .focal-info-item.accent { color: var(--accent); }
        
        .ctrl-btn { 
            height: 50px; 
            border-radius: 8px; 
            background: #151515; 
            border: 1px solid #333; 
            color: #777; 
            font-size: 9px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            line-height: 1.2;
        }
        .ctrl-btn span { color: var(--accent); font-size: 11px; margin-top: 2px; }
        
        .rec-btn { background: #600; border: none; font-size: 12px; color: white; }

        /* 启动遮罩 */
        #mask { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; color: var(--accent); text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="mask" onclick="init()">
    <div>
        <h2 style="letter-spacing: 2px; font-weight: 300;">CINEVIEW PRO</h2>
        <p style="font-size: 10px; color: #555; margin-top: 10px;">[ INITIALIZING MASTER SENSOR ]</p>
    </div>
</div>

<div class="top-bar">
    <div id="status-l">MODE: NATIVE</div>
    <div id="device-tag">IPHONE 16 PRO</div>
    <div id="status-r">ALL FRAMELINES</div>
</div>

<div id="viewport-container">
    <div id="viewfinder">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>
</div>

<div class="bottom-bar">
    <div class="ctrl-btn" onclick="switchCam()">CAM<br><span id="cam-label">16P</span></div>
    <div class="ctrl-btn" onclick="switchFormat()">FMT<br><span id="fmt-label">NATIVE</span></div>
    <div class="focal-info-list" id="info-container"></div>
    <div class="ctrl-btn rec-btn" onclick="takeSnapshot()">REC</div>
</div>

<script>
    const state = {
        idx: 1,
        devs: [
            {n:'15P', fullName: 'IPHONE 15 PRO', tele:3, teleMM:72}, 
            {n:'16P', fullName: 'IPHONE 16 PRO', tele:5, teleMM:120}, 
            {n:'17P', fullName: 'IPHONE 17 PRO', tele:4, teleMM:100}
        ],
        fmt: 'NATIVE',
        config: {
            NATIVE: ['1x', 'Tele'],
            S35: ['16', '21', '32', '40', '50', '75'],
            FF: ['24', '32', '40', '50', '75']
        }
    };

    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    async function init() {
        const mask = document.getElementById('mask');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            v.srcObject = stream;
            v.setAttribute('playsinline', 'true');
            v.onloadedmetadata = () => {
                v.play();
                sync();
                updateInfoUI();
                mask.style.display = 'none';
                requestAnimationFrame(renderLoop);
            };
        } catch (e) {
            mask.innerHTML = `<div style="color:#ff4444;">授权失败<br><button onclick="location.reload()" style="margin-top:10px;">重试</button></div>`;
        }
    }

    function switchFormat() {
        const fmts = ['NATIVE', 'S35', 'FF'];
        state.fmt = fmts[(fmts.indexOf(state.fmt) + 1) % fmts.length];
        document.getElementById('fmt-label').innerText = state.fmt;
        document.getElementById('status-l').innerText = `MODE: ${state.fmt}`;
        updateInfoUI();
    }

    function switchCam() {
        state.idx = (state.idx + 1) % state.devs.length;
        document.getElementById('cam-label').innerText = state.devs[state.idx].n;
        document.getElementById('device-tag').innerText = state.devs[state.idx].fullName;
        updateInfoUI();
    }

    function updateInfoUI() {
        const container = document.getElementById('info-container');
        container.innerHTML = '';
        const list = state.config[state.fmt];
        list.forEach((f, i) => {
            const el = document.createElement('span');
            // 第一个焦段（极限焦段）使用金黄色，其余为灰色
            el.className = `focal-info-item ${i === 0 ? 'accent' : ''}`;
            el.innerText = f === 'Tele' ? state.devs[state.idx].tele + 'x' : f;
            container.appendChild(el);
        });
    }

    function sync() {
        const r = document.getElementById('viewfinder').getBoundingClientRect();
        c.width = r.width;
        c.height = r.height;
    }

    function renderLoop() {
        ctx.clearRect(0, 0, c.width, c.height);
        const list = state.config[state.fmt];
        
        list.forEach((focalStr, index) => {
            let targetMM = 24;
            if (state.fmt === 'NATIVE') {
                targetMM = (focalStr === '1x') ? 24 : state.devs[state.idx].teleMM;
            } else if (state.fmt === 'S35') {
                targetMM = parseFloat(focalStr) * 1.5;
            } else {
                targetMM = parseFloat(focalStr);
            }

            const ratio = 24 / targetMM;
            if (ratio > 1.05) return; // 超出视野不绘

            const bw = c.width * ratio;
            const bh = c.height * ratio;
            const bx = (c.width - bw) / 2;
            const by = (c.height - bh) / 2;

            // 样式逻辑对齐
            ctx.lineWidth = 2;
            if (index === 0) {
                // 极限框线：金黄色实线
                ctx.strokeStyle = "#FFD700";
                ctx.setLineDash([]);
            } else {
                // 其余框线：白色
                ctx.strokeStyle = "#FFFFFF";
                // 焦段 > 40mm 使用虚线 (S35 下 40mm 等效 60mm，符合 > 40mm 逻辑)
                if (parseFloat(focalStr) > 40 || (state.fmt === 'NATIVE' && focalStr === 'Tele')) {
                    ctx.setLineDash([10, 8]);
                } else {
                    ctx.setLineDash([]);
                }
            }

            ctx.strokeRect(bx, by, bw, bh);

            // 绘制标注
            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = "9px monospace";
            const label = state.fmt === 'NATIVE' ? 
                (focalStr === '1x' ? "1x 24mm" : `${state.devs[state.idx].tele}x ${state.devs[state.idx].teleMM}mm`) : 
                `${state.fmt} ${focalStr}mm`;
            ctx.fillText(label, bx + 5, by + 12);
        });

        requestAnimationFrame(renderLoop);
    }

    function takeSnapshot() {
        const out = document.createElement('canvas');
        out.width = 1920; out.height = 1440;
        const oCtx = out.getContext('2d');
        oCtx.drawImage(v, 0, 0, out.width, out.height);
        
        // 抓取当前所有框线
        // (由于渲染函数是实时的，此处简单模拟绘制逻辑)
        const list = state.config[state.fmt];
        list.forEach((focalStr, index) => {
            let targetMM = 24;
            if (state.fmt === 'NATIVE') targetMM = (focalStr === '1x') ? 24 : state.devs[state.idx].teleMM;
            else if (state.fmt === 'S35') targetMM = parseFloat(focalStr) * 1.5;
            else targetMM = parseFloat(focalStr);

            const ratio = 24 / targetMM;
            if (ratio <= 1.05) {
                const bw = out.width * ratio; const bh = out.height * ratio;
                const bx = (out.width - bw) / 2; const by = (out.height - bh) / 2;
                oCtx.lineWidth = 4; // 导出大图线宽加倍
                oCtx.strokeStyle = (index === 0) ? "#FFD700" : "#FFFFFF";
                if (parseFloat(focalStr) > 40 || (state.fmt === 'NATIVE' && focalStr === 'Tele')) oCtx.setLineDash([20, 16]);
                else oCtx.setLineDash([]);
                oCtx.strokeRect(bx, by, bw, bh);
            }
        });

        const wmH = 100;
        oCtx.fillStyle = "rgba(0,0,0,0.7)";
        oCtx.setLineDash([]);
        oCtx.fillRect(0, out.height - wmH, out.width, wmH);
        oCtx.fillStyle = "white";
        oCtx.font = "24px monospace";
        oCtx.fillText(`PROJ: XUNZI YIJI | MODE: ${state.fmt} | ALL FRAMELINES | ${state.devs[state.idx].fullName}`, 40, out.height - 40);

        const link = document.createElement('a');
        link.download = `CineScout_v2.5_${Date.now()}.jpg`;
        link.href = out.toDataURL('image/jpeg', 0.95);
        link.click();
    }

    window.addEventListener('resize', sync);
    window.addEventListener('orientationchange', () => setTimeout(sync, 500));
</script>
</body>
</html>
