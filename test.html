<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineView Pro v3.3</title>
    <style>
        :root { --accent: #FFD700; --side-w: 70px; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; flex-direction: row; font-family: -apple-system, sans-serif; }

        /* 左侧固定状态 */
        .left-bar { width: 45px; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 0; box-sizing: border-box; border-right: 1px solid #111; z-index: 100; font-size: 10px; color: #444; }
        .side-tag { writing-mode: vertical-lr; transform: rotate(180deg); text-align: center; letter-spacing: 1px; }

        /* 中央取景器 - 比例跟随物理状态 */
        #viewport-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #050505; }
        #viewfinder { position: relative; width: 95%; height: 92%; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* 右侧固定按钮 - 文字竖排 */
        .right-bar { width: var(--side-w); height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; border-left: 1px solid #111; padding-bottom: env(safe-area-inset-bottom); }
        .ctrl-btn { width: 52px; height: 52px; border-radius: 50%; background: #0a0a0a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-text { writing-mode: vertical-rl; text-orientation: upright; font-size: 10px; color: #777; font-weight: 300; letter-spacing: 2px; line-height: 1.1; }
        .btn-text span { color: var(--accent); font-weight: 400; margin-top: 4px; }
        .rec-btn { background: #300; border-color: #500; }

        #mask { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="mask" onclick="init()">
    <div style="text-align:center;"><h2 style="font-weight:200; letter-spacing:5px;">CINEVIEW</h2><p style="font-size:9px; color:#444;">[ PHYSICAL ORIENTATION READY ]</p></div>
</div>

<div class="left-bar">
    <div class="side-tag" id="status-l">MODE: S35</div>
    <div class="side-tag" id="device-tag">IPHONE 17 PRO</div>
</div>

<div id="viewport-container">
    <div id="viewfinder">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>
</div>

<div class="right-bar">
    <div class="ctrl-btn rec-btn" onclick="takeSnapshot()"><div class="btn-text">REC</div></div>
    <div class="ctrl-btn" onclick="switchFormat()"><div class="btn-text">FMT:<span>S35</span></div></div>
    <div class="ctrl-btn" onclick="switchCam()"><div class="btn-text">BODY:<span>17P</span></div></div>
</div>

<script>
    const state = {
        idx: 2,
        devs: [{n:'15P', full:'IPHONE 15 PRO', tmm:72}, {n:'16P', full:'IPHONE 16 PRO', tmm:120}, {n:'17P', full:'IPHONE 17 PRO', tmm:100}],
        fmt: 'S35',
        config: {
            NATIVE: ['1x', 'Tele'],
            S35: ['16', '21', '32', '40', '50', '75'],
            FF: ['24', '32', '40', '50', '75']
        }
    };

    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: {ideal: 1920} } });
            v.srcObject = stream;
            v.onloadedmetadata = () => {
                document.getElementById('mask').style.display = 'none';
                sync();
                requestAnimationFrame(render);
            };
        } catch (e) { alert("HTTPS Required for Camera"); }
    }

    function sync() {
        // 核心：强制 Canvas 像素分辨率匹配视频原始流，消除所有拉伸
        c.width = v.videoWidth;
        c.height = v.videoHeight;
    }

    function render() {
        ctx.clearRect(0, 0, c.width, c.height);
        const list = state.config[state.fmt];
        
        list.forEach((f, i) => {
            let mm = 24;
            if (state.fmt === 'NATIVE') mm = (f === '1x') ? 24 : state.devs[state.idx].tmm;
            else if (state.fmt === 'S35') mm = parseFloat(f) * 1.5;
            else mm = parseFloat(f);

            const ratio = 24 / mm;
            if (ratio > 1.05) return;

            const bw = c.width * ratio; const bh = c.height * ratio;
            const bx = (c.width - bw) / 2; const by = (c.height - bh) / 2;

            ctx.lineWidth = 6; // 分辨率高，线宽加粗
            ctx.strokeStyle = (i === 0) ? "#FFD700" : "#FFFFFF";
            ctx.setLineDash((parseFloat(f) > 40 || f === 'Tele') ? [30, 20] : []);
            ctx.strokeRect(bx, by, bw, bh);

            // 标注旋转：顺时针 90 度旋转，引导用户横屏阅读
            ctx.save();
            ctx.translate(bx + 30, by + 60);
            ctx.rotate(Math.PI / 2); 
            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = "bold 40px monospace";
            ctx.fillText(f.includes('x') ? f : f + "mm", 0, 0);
            ctx.restore();
        });
        requestAnimationFrame(render);
    }

    async function takeSnapshot() {
        const dataUrl = c.toDataURL('image/jpeg', 0.95);
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], `CineView_${Date.now()}.jpg`, { type: 'image/jpeg' });

        if (navigator.share) {
            try { await navigator.share({ files: [file] }); } catch (e) {}
        } else {
            const link = document.createElement('a');
            link.download = `CineView_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();
        }
    }

    function switchFormat() {
        const fmts = ['NATIVE', 'S35', 'FF'];
        state.fmt = fmts[(fmts.indexOf(state.fmt) + 1) % fmts.length];
        document.querySelector('[onclick="switchFormat()"] span').innerText = state.fmt;
        document.getElementById('status-l').innerText = `MODE: ${state.fmt}`;
    }

    function switchCam() {
        state.idx = (state.idx + 1) % state.devs.length;
        document.querySelector('[onclick="switchCam()"] span').innerText = state.devs[state.idx].n;
        document.getElementById('device-tag').innerText = state.devs[state.idx].full;
    }

    window.addEventListener('resize', sync);
</script>
</body>
</html>
