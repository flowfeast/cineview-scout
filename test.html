<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineView Pro v3.4</title>
    <style>
        :root { --accent: #FFD700; --bar-h: 70px; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        /* 顶部状态栏 - 竖拿在顶，横拿在左 */
        .top-status { height: var(--bar-h); width: 100%; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; box-sizing: border-box; border-bottom: 1px solid #1a1a1a; z-index: 100; padding-top: env(safe-area-inset-top); }
        .status-item { color: #555; font-size: 11px; letter-spacing: 1px; }

        /* 中央取景器 */
        #viewport-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #050505; overflow: hidden; }
        #viewfinder { position: relative; width: 95%; height: 95%; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* 底部操作栏 - 竖拿在底，横拿在右 */
        .bottom-action { height: calc(var(--bar-h) + 30px); width: 100%; background: #000; display: flex; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid #1a1a1a; }
        
        .ctrl-btn { width: 55px; height: 55px; border-radius: 50%; background: #0a0a0a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* 核心修改：按钮文字整体旋转 90 度 */
        .btn-label { transform: rotate(90deg); color: #888; font-size: 10px; font-weight: 300; white-space: nowrap; letter-spacing: 1px; }
        .btn-label span { color: var(--accent); font-weight: 500; }
        
        .rec-btn { background: #200; border-color: #500; }
        .rec-btn .btn-label { color: #fff; font-weight: bold; }

        #mask { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="mask" onclick="init()">
    <div style="text-align:center;"><h2 style="font-weight:200; letter-spacing:5px;">CINEVIEW</h2><p style="font-size:9px; color:#444;">[ SENSOR ALIGNED ]</p></div>
</div>

<div class="top-status">
    <div class="status-item" id="status-l">MODE: S35</div>
    <div class="status-item" id="device-tag">IPHONE 17 PRO</div>
</div>

<div id="viewport-container">
    <div id="viewfinder">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>
</div>

<div class="bottom-action">
    <div class="ctrl-btn rec-btn" onclick="takeSnapshot()"><div class="btn-label">REC</div></div>
    <div class="ctrl-btn" onclick="switchFormat()"><div class="btn-label">FMT: <span id="fmt-val">S35</span></div></div>
    <div class="ctrl-btn" onclick="switchCam()"><div class="btn-label">BODY: <span id="cam-val">17P</span></div></div>
</div>

<script>
    const state = {
        idx: 2,
        devs: [{n:'15P', full:'IPHONE 15 PRO', tmm:72}, {n:'16P', full:'IPHONE 16 PRO', tmm:120}, {n:'17P', full:'IPHONE 17 PRO', tmm:100}],
        fmt: 'S35',
        config: {
            NATIVE: ['1x', 'Tele'],
            S35: ['16', '21', '32', '40', '50', '75'],
            FF: ['24', '32', '40', '50', '75']
        }
    };

    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: {ideal: 1920} } });
            v.srcObject = stream;
            v.onloadedmetadata = () => {
                document.getElementById('mask').style.display = 'none';
                sync();
                requestAnimationFrame(render);
            };
        } catch (e) { alert("HTTPS required"); }
    }

    function sync() {
        c.width = v.videoWidth;
        c.height = v.videoHeight;
    }

    function render() {
        ctx.clearRect(0, 0, c.width, c.height);
        const list = state.config[state.fmt];
        
        list.forEach((f, i) => {
            let mm = 24;
            if (state.fmt === 'NATIVE') mm = (f === '1x') ? 24 : state.devs[state.idx].tmm;
            else if (state.fmt === 'S35') mm = parseFloat(f) * 1.5;
            else mm = parseFloat(f);

            const ratio = 24 / mm;
            if (ratio > 1.05) return;

            const bw = c.width * ratio; const bh = c.height * ratio;
            const bx = (c.width - bw) / 2; const by = (c.height - bh) / 2;

            ctx.lineWidth = 6;
            ctx.strokeStyle = (i === 0) ? "#FFD700" : "#FFFFFF";
            ctx.setLineDash((parseFloat(f) > 40 || f === 'Tele') ? [30, 20] : []);
            ctx.strokeRect(bx, by, bw, bh);

            // 标注：顺时针旋转 90 度
            ctx.save();
            ctx.translate(bx + 35, by + 75);
            ctx.rotate(Math.PI / 2); 
            ctx.fillStyle = ctx.strokeStyle;
            ctx.font = "bold 42px monospace";
            ctx.fillText(f.includes('x') ? f : f + "mm", 0, 0);
            ctx.restore();
        });
        requestAnimationFrame(render);
    }

    async function takeSnapshot() {
        const dataUrl = c.toDataURL('image/jpeg', 0.95);
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], `CineScout_${Date.now()}.jpg`, { type: 'image/jpeg' });
        if (navigator.share) {
            try { await navigator.share({ files: [file] }); } catch(e){}
        } else {
            const link = document.createElement('a');
            link.download = `CineScout_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();
        }
    }

    function switchFormat() {
        const fmts = ['NATIVE', 'S35', 'FF'];
        state.fmt = fmts[(fmts.indexOf(state.fmt) + 1) % fmts.length];
        document.getElementById('fmt-val').innerText = state.fmt;
        document.getElementById('status-l').innerText = `MODE: ${state.fmt}`;
    }

    function switchCam() {
        state.idx = (state.idx + 1) % state.devs.length;
        document.getElementById('cam-val').innerText = state.devs[state.idx].n;
        document.getElementById('device-tag').innerText = state.devs[state.idx].full;
    }

    window.addEventListener('resize', sync);
</script>
</body>
</html>
