<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineView Pro v4.2 - Deep Inset</title>
    <style>
        :root { --accent: #FFD700; --bar-h: 75px; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; flex-direction: column; font-family: -apple-system, sans-serif; }

        .top-status { height: var(--bar-h); width: 100%; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; box-sizing: border-box; border-bottom: 1px solid #111; z-index: 100; padding-top: env(safe-area-inset-top); }
        .status-item { color: #555; font-size: 10px; letter-spacing: 1px; font-weight: 300; text-transform: uppercase; }

        #viewport-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        #viewfinder { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { display: none; } 
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .bottom-action { height: calc(var(--bar-h) + 20px); width: 100%; background: #000; display: flex; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid #111; }
        .ctrl-btn { width: 58px; height: 58px; border-radius: 50%; background: #0a0a0a; border: 1px solid #222; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-label { transform: rotate(90deg); color: #777; font-size: 9px; font-weight: 300; white-space: nowrap; letter-spacing: 1px; text-align: center; line-height: 1.2; }
        .btn-label span { color: var(--accent); font-weight: 500; display: block; margin-top: 1px; }
        .rec-btn { background: #250000; border-color: #500; }

        #mask { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div id="mask" onclick="init()">
    <div style="text-align:center;"><h2 style="font-weight:200; letter-spacing:5px;">CINEVIEW</h2><p style="font-size:9px; color:#444;">[ DEEP INSET LABELS v4.2 ]</p></div>
</div>

<div class="top-status">
    <div class="status-item" id="status-l">MODE: S35</div>
    <div class="status-item" id="device-tag">IPHONE 17 PRO</div>
</div>

<div id="viewport-container">
    <div id="viewfinder">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>
</div>

<div class="bottom-action">
    <div class="ctrl-btn rec-btn" onclick="takeSnapshot()"><div class="btn-label">REC</div></div>
    <div class="ctrl-btn" onclick="switchFormat()"><div class="btn-label">FMT<span>S35</span></div></div>
    <div class="ctrl-btn" onclick="switchCam()"><div class="btn-label">CAM<span id="cam-val">17P</span></div></div>
</div>

<script>
    const state = {
        idx: 2,
        devs: [{n:'15P', full:'IPHONE 15 PRO', tmm:72}, {n:'16P', full:'IPHONE 16 PRO', tmm:120}, {n:'17P', full:'IPHONE 17 PRO', tmm:100}],
        fmt: 'S35',
        config: {
            NATIVE: ['1x', 'Tele'],
            S35: ['16', '21', '32', '40', '50', '75'],
            FF: ['24', '32', '40', '50', '75']
        }
    };

    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: {ideal: 1920} } });
            v.srcObject = stream;
            v.onloadedmetadata = () => {
                document.getElementById('mask').style.display = 'none';
                sync();
                requestAnimationFrame(render);
            };
        } catch (e) { alert("Camera Access Required."); }
    }

    function sync() {
        const rect = c.getBoundingClientRect();
        c.width = rect.width * window.devicePixelRatio;
        c.height = rect.height * window.devicePixelRatio;
    }

    function render() {
        ctx.clearRect(0, 0, c.width, c.height);
        const vW = v.videoWidth, vH = v.videoHeight, cW = c.width, cH = c.height;
        const scale = Math.max(cW / vW, cH / vH);
        const drawW = vW * scale, drawH = vH * scale;
        const offsetX = (cW - drawW) / 2, offsetY = (cH - drawH) / 2;
        ctx.drawImage(v, offsetX, offsetY, drawW, drawH);

        const list = state.config[state.fmt];
        const dpr = window.devicePixelRatio;

        list.forEach((f, i) => {
            let mm = 24;
            if (state.fmt === 'NATIVE') mm = (f === '1x') ? 24 : state.devs[state.idx].tmm;
            else if (state.fmt === 'S35') mm = parseFloat(f) * 1.5;
            else mm = parseFloat(f);

            const ratio = 24 / mm;
            if (ratio > 1.05) return;

            const bw = c.width * ratio, bh = c.height * ratio;
            const bx = (c.width - bw) / 2, by = (c.height - bh) / 2;

            // 极细线宽
            ctx.lineWidth = 1.3 * dpr;
            ctx.strokeStyle = (i === 0) ? "#FFD700" : "rgba(255,255,255,0.7)";
            ctx.setLineDash((parseFloat(f) > 40 || f === 'Tele') ? [10 * dpr, 8 * dpr] : []);
            ctx.strokeRect(bx, by, bw, bh);

            // --- 极致避让修改：深度内缩 ---
            ctx.save();
            // 大幅增加 textX 偏移到 28px，确保文字距离右边框有充足空隙
            const textX = bx + bw - (28 * dpr); 
            const textY = by + bh - (12 * dpr);
            
            ctx.translate(textX, textY);
            ctx.rotate(Math.PI / 2); 
            
            ctx.fillStyle = ctx.strokeStyle;
            ctx.shadowColor = "rgba(0,0,0,0.9)";
            ctx.shadowBlur = 4 * dpr;
            ctx.font = `${9 * dpr}px monospace`;
            ctx.textAlign = "left"; 
            
            const label = (f === 'Tele') ? 
                (state.devs[state.idx].tmm/24).toFixed(0) + 'x ' + state.devs[state.idx].tmm + 'mm' : 
                f + "mm";
            
            ctx.fillText(label, 0, 0);
            ctx.restore();
        });

        requestAnimationFrame(render);
    }

    async function takeSnapshot() {
        const dataUrl = c.toDataURL('image/jpeg', 0.95);
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], `CineView_v4.2.jpg`, { type: 'image/jpeg' });
        if (navigator.share) await navigator.share({ files: [file] });
    }

    function switchFormat() {
        const fmts = ['NATIVE', 'S35', 'FF'];
        state.fmt = fmts[(fmts.indexOf(state.fmt) + 1) % fmts.length];
        document.querySelector('[onclick="switchFormat()"] span').innerText = state.fmt;
        document.getElementById('status-l').innerText = `MODE: ${state.fmt}`;
    }

    function switchCam() {
        state.idx = (state.idx + 1) % state.devs.length;
        document.getElementById('cam-val').innerText = state.devs[state.idx].n;
        document.getElementById('device-tag').innerText = state.devs[state.idx].full;
    }

    window.addEventListener('resize', sync);
</script>
</body>
</html>
